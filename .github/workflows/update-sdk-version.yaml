name: Update SDK Version

on:
  release:
    types: [created]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-version:
    name: Update __SDK_VERSION__
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get version from release tag or latest release
        id: get-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            VERSION="${{ github.event.release.tag_name }}"
          else
            VERSION=$(gh release view --json tagName --jq '.tagName')
          fi
          # Strip leading 'v' if present
          VERSION="${VERSION#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Update __SDK_VERSION__ in __version__.py
        run: |
          sed -i "s/^__SDK_VERSION__ = \".*\"/__SDK_VERSION__ = \"${{ steps.get-version.outputs.version }}\"/" anaconda_opentelemetry/__version__.py

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add anaconda_opentelemetry/__version__.py
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "update __SDK_VERSION__ to ${{ steps.get-version.outputs.version }}"
          git push
